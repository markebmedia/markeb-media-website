<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="website/assets/js/airtable.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
    font-family: 'Mukta', sans-serif;
    background: #FDF3E2;
    min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1F2E3C;
            position: relative;
            overflow-x: hidden;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* Dark overlay for readability */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(253,243,226,0.45);
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            position: relative;
            border: 1px solid #f1f5f9;
            z-index: 1;
        }

        /* BLUE header */
        .login-header {
    background: #ffffff;
    border-bottom: 4px solid #3F4D1B;
    color: #3F4D1B;
            padding: 40px 30px 30px;
            text-align: center;
            position: relative;
        }

        .login-header::before { display: none; }

        .logo { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.5px; }
        .login-subtitle { opacity: 0.9; font-size: 1rem; margin-bottom: 20px; }

        .login-form { padding: 40px 30px 30px; }

        .tab-buttons {
            display: flex;
            margin-bottom: 30px;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 4px;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #6b7280;
        }

        /* BLUE active tab */
        .tab-button.active {
            background: white;
            color: #B46100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #1F2E3C; font-size: 0.9rem; }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
            color: #1F2E3C;
        }

        /* Password input with icon */
        .password-input-wrapper {
            position: relative;
        }

        .password-input-wrapper input {
            padding-right: 50px;
        }

        /* Password toggle button */
        .password-toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease;
            color: #6b7280;
        }

        .password-toggle-btn:hover {
            opacity: 0.7;
        }

        .password-toggle-btn:focus {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
            border-radius: 4px;
        }

        .password-toggle-btn svg {
            width: 20px;
            height: 20px;
        }

        /* BLUE focus ring */
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #B46100;
            box-shadow: 0 0 0 3px rgba(180,97,0,0.15);
        }

        /* BLUE button */
        .login-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #B46100, #8a4a00);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(180,97,0,0.35);
        }

        .login-button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* BLUE links */
        .forgot-password { text-align: center; margin-bottom: 20px; }
        .forgot-password a { color: #3b82f6; text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        .forgot-password a:hover { text-decoration: underline; }

        .divider { text-align: center; margin: 30px 0; position: relative; color: #9ca3af; font-size: 0.9rem; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e5e7eb; }
        .divider span { background: white; padding: 0 15px; position: relative; z-index: 1; }

        .back-to-landing { text-align: center; margin-top: 20px; }
        .back-to-landing a { color: #1F2E3C; text-decoration: none; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 5px; opacity: 0.7; }
        .back-to-landing a:hover { color: #B46100; opacity: 1; }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .loading { display: none; text-align: center; color: #1F2E3C; margin-top: 10px; opacity: 0.7; }
        .signup-form { display: none; }

        @media (max-width: 480px) {
            .login-container { margin: 10px; }
            .login-header { padding: 30px 20px 20px; }
            .login-form { padding: 30px 20px 20px; }
            .logo { font-size: 1.5rem; }
        }
    </style>
</head>

    <script>
        // Initialize Lucide icons
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
        });

        // Toggle password visibility
        function togglePasswordVisibility(inputId) {
            const passwordInput = document.getElementById(inputId);
            const icon = document.getElementById(`${inputId}-icon`);
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            
            // Recreate the icon with new type
            lucide.createIcons();
        }

        // Show suspended account message if redirected from dashboard
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('suspended') === 'true') {
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.innerHTML = '⛔ Your account has been suspended. Please contact <a href="mailto:commercial@markebmedia.com" style="color:#991b1b;font-weight:700;">commercial@markebmedia.com</a> to resolve this.';
                errorDiv.style.display = 'block';
                errorDiv.style.background = '#fef2f2';
                errorDiv.style.border = '2px solid #ef4444';
                errorDiv.style.borderRadius = '10px';
                errorDiv.style.padding = '16px';
                window.history.replaceState({}, '', window.location.pathname);
            }
        });

        // If already logged in, bounce to dashboard (only if not suspended)
        window.addEventListener('load', async function() {
            if (typeof AirtableAPI !== 'undefined') {
                try {
                    const isLoggedIn = await AirtableAPI.isUserLoggedIn();
                    if (isLoggedIn) {
                        const email = localStorage.getItem('user_email');
                        if (email) {
                            const suspensionCheck = await fetch('/.netlify/functions/check-account-status', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email: email })
                            });
                            const suspensionData = await suspensionCheck.json();

                            if (suspensionData.success && suspensionData.suspended === true) {
                                // Clear session so they can't bypass login
                                localStorage.clear();
                                sessionStorage.clear();
                                const errorDiv = document.getElementById('errorMessage');
                                errorDiv.innerHTML = '⛔ Your account has been suspended. Please contact <a href="mailto:commercial@markebmedia.com" style="color:#991b1b;font-weight:700;">commercial@markebmedia.com</a> to resolve this.';
                                errorDiv.style.display = 'block';
                                errorDiv.style.background = '#fef2f2';
                                errorDiv.style.border = '2px solid #ef4444';
                                errorDiv.style.borderRadius = '10px';
                                errorDiv.style.padding = '16px';
                                return;
                            }
                        }
                        window.location.href = 'website/dashboard.html';
                    }
                } catch (error) {
                    console.log('Authentication check failed:', error);
                }
            }
        });

        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
            document.querySelectorAll('.tab-button')[0].classList.add('active');
            document.querySelectorAll('.tab-button')[1].classList.remove('active');
            hideError();
        }

        function showSignupForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.querySelectorAll('.tab-button')[0].classList.remove('active');
            document.querySelectorAll('.tab-button')[1].classList.add('active');
            hideError();
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() { document.getElementById('errorMessage').style.display = 'none'; }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loginButton').disabled = true;
            document.getElementById('signupButton').disabled = true;
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('loginButton').disabled = false;
            document.getElementById('signupButton').disabled = false;
        }

        async function handleLogin(event) {
            event.preventDefault();
            hideError();
            showLoading();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!AirtableAPI.validateEmail(email)) {
                showError('Please enter a valid email address.');
                hideLoading();
                return;
            }

            try {
                const response = await AirtableAPI.authenticateUser(email, password);
                if (response.success) {

                    // ✅ SUSPENSION CHECK BEFORE ALLOWING ACCESS
                    const suspensionCheck = await fetch('/.netlify/functions/check-account-status', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email })
                    });
                    const suspensionData = await suspensionCheck.json();

                    if (suspensionData.success && suspensionData.suspended === true) {
                        // Do NOT store session — block access entirely
                        const errorDiv = document.getElementById('errorMessage');
                        errorDiv.innerHTML = '⛔ Your account has been suspended. Please contact <a href="mailto:commercial@markebmedia.com" style="color:#991b1b;font-weight:700;">commercial@markebmedia.com</a> to resolve this.';
                        errorDiv.style.display = 'block';
                        errorDiv.style.background = '#fef2f2';
                        errorDiv.style.border = '2px solid #ef4444';
                        errorDiv.style.borderRadius = '10px';
                        errorDiv.style.padding = '16px';
                        hideLoading();
                        return;
                    }

                    // mark action for dashboard greeting
                    localStorage.setItem('auth_action','login');
                    AirtableAPI.storeUserSession(response.token, email);
                    window.location.href = 'website/dashboard.html';
                } else {
                    showError(response.message || 'Invalid email or password. Please try again.');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Connection error. Please check your internet and try again.');
            } finally {
                hideLoading();
            }
        }

        async function handleSignup(event) {
            event.preventDefault();
            hideError();

            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const company = document.getElementById('signupCompany').value;
            const region = document.getElementById('signupRegion').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!AirtableAPI.validateRequired(name)) { showError('Full name is required.'); return; }
            if (!AirtableAPI.validateEmail(email)) { showError('Please enter a valid email address.'); return; }
            if (!AirtableAPI.validateRequired(company)) { showError('Company name is required.'); return; }
            if (!region) { showError('Please select your region.'); return; }
            if (!AirtableAPI.validatePassword(password)) { showError('Password must be at least 8 characters with letters and numbers.'); return; }
            if (password !== confirmPassword) { showError('Passwords do not match.'); return; }

            showLoading();

            try {
                const response = await AirtableAPI.createUser({ name, email, company, region, password });
                if (response.success) {
                    // mark action for dashboard greeting
                    localStorage.setItem('auth_action','signup');
                    AirtableAPI.storeUserSession(response.token, email);
                    window.location.href = 'website/dashboard.html';
                } else {
                    showError(response.message || 'Failed to create account. Please try again.');
                }
            } catch (error) {
                console.error('Signup error:', error);
                showError('Connection error. Please check your internet and try again.');
            } finally {
                hideLoading();
            }
        }
    </script>
</body>
